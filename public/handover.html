.profile-meta{flex:1;min-width:0}.profile-name{font-weight:950;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.profile-role{font-size:12px;color:var(--muted);font-weight:700;margin-top:3px}.profile-foot{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

input,select,textarea{width:100%;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:15px;padding:11px 12px;outline:none;font-weight:700;transition:.18s ease}

textarea{min-height:110px;resize:vertical;line-height:1.5}.form-grid{display:grid;gap:13px}.fg2{grid-template-columns:repeat(2,1fr)}.fg3{grid-template-columns:repeat(3,1fr)}.fg4{grid-template-columns:repeat(4,1fr)}

.drawer-backdrop{position:fixed;inset:0;background:rgba(15,10,25,.36);backdrop-filter:blur(7px);z-index:40;display:none}.drawer-backdrop.show{display:block}.drawer{position:fixed;right:0;top:0;width:min(720px,100vw);height:100vh;background:var(--bg);border-left:1px solid var(--line);box-shadow:-30px 0 80px rgba(0,0,0,.25);z-index:50;transform:translateX(104%);transition:.25s ease;display:flex;flex-direction:column}.drawer.show{transform:translateX(0)}.drawer-head{height:78px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:var(--card)}.drawer-body{padding:20px;overflow:auto}.drawer-title{font-size:18px;font-weight:950}.modal-backdrop{position:fixed;inset:0;background:rgba(15,10,25,.45);backdrop-filter:blur(8px);z-index:80;display:none;align-items:center;justify-content:center;padding:20px}.modal-backdrop.show{display:flex}.modal{width:min(620px,100%);background:var(--bg);border:1px solid var(--line);border-radius:26px;box-shadow:0 35px 90px rgba(0,0,0,.30);overflow:hidden}.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:space-between}.modal-body{padding:20px}.modal-title{font-size:18px;font-weight:950}.toast{position:fixed;bottom:22px;right:22px;z-index:100;background:linear-gradient(135deg,var(--gc-purple),var(--gc-orange));color:#fff;padding:13px 18px;border-radius:16px;font-weight:900;box-shadow:0 18px 44px rgba(82,53,140,.35);display:none;max-width:360px}.toast.show{display:block;animation:pop .22s ease}@keyframes pop{from{transform:translateY(8px);opacity:.2}to{transform:translateY(0);opacity:1}}

<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark" aria-label="TryGC mark">
        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <circle cx="20" cy="18" r="11" stroke="white" stroke-width="5" opacity=".98"/>
          <circle cx="20" cy="18" r="5" fill="white"/>
          <circle cx="31" cy="9" r="4" fill="white" opacity=".92"/>
          <path d="M10 32c0 7 5 11 12 11 6 0 11-3 14-8" stroke="white" stroke-width="5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">TRYGC OS</div>
        <div class="brand-sub">Premium Handover</div>
      </div>
    </div>
    <div class="motto">SPEAK · <b>CONNECT</b> · IMPACT</div>
    <div class="nav-wrap" id="navWrap"></div>
    <div class="profile-mini" id="profileMini"></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="title">
        <h1 id="pageTitle">Command Center</h1>
        <p id="pageSub">Live team handover, ownership, and escalation control.</p>
      </div>
      <div class="actions">
        <button class="btn ghost" onclick="toggleTheme()" title="Toggle light/dark mode">◐ Theme</button>
        <button class="btn" onclick="exportCSV()">⇩ CSV</button>
        <button class="btn" onclick="exportJSON()">⇩ Backup</button>
        <button class="btn" onclick="document.getElementById('importFile').click()">⇧ Import</button>
        <input id="importFile" type="file" accept="application/json" class="hidden" />
        <button class="btn primary" onclick="openHandoverForm()">＋ New Handover</button>

<script>
'use strict';
const STORE_KEY = 'trygc_os_premium_v2';
const OLD_KEY = 'trygc_handover_v1';
const TODAY = () => new Date().toISOString().slice(0,10);
const uid = (p='id') => `${p}_${Math.random().toString(36).slice(2,8)}_${Date.now().toString(36).slice(-5)}`;
const clone = obj => JSON.parse(JSON.stringify(obj));
const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));
const esc = v => String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const fmtDate = iso => iso ? new Date(iso).toLocaleString('en-GB',{dateStyle:'medium',timeStyle:'short'}) : '—';
const fmtShort = iso => iso ? new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) : '—';
const toLocalDT = iso => { if(!iso) return ''; const d=new Date(iso); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16); };
const fromLocalDT = val => val ? new Date(val).toISOString() : '';
const hoursSince = iso => iso ? (Date.now() - new Date(iso).getTime()) / 36e5 : 0;
const timeAgo = iso => {
  const h = hoursSince(iso);

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const parsed = JSON.parse(raw); return normalizeState(parsed); }
    const oldRaw = localStorage.getItem(OLD_KEY);
    if(oldRaw){ return migrateOld(JSON.parse(oldRaw)); }
  }catch(err){ console.warn('State load failed',err); }
  const seeded = seedState();
  localStorage.setItem(STORE_KEY,JSON.stringify(seeded));
  return seeded;
}
function normalizeState(s){
  const seeded = seedState();
  s.version = 2;
  s.teams = Array.isArray(s.teams) && s.teams.length ? s.teams : seeded.teams;
  s.markets = Array.isArray(s.markets) && s.markets.length ? s.markets : seeded.markets;
  s.users = Array.isArray(s.users) && s.users.length ? s.users : seeded.users;
  s.activeUserId = s.activeUserId && s.users.some(u=>u.id===s.activeUserId) ? s.activeUserId : s.users[0].id;
  s.handovers = Array.isArray(s.handovers) ? s.handovers : [];
  s.escalations = Array.isArray(s.escalations) ? s.escalations : [];
  s.notifications = Array.isArray(s.notifications) ? s.notifications : [];
  s.activity = Array.isArray(s.activity) ? s.activity : [];
  s.settings = Object.assign(seeded.settings, s.settings || {});
  return s;
}

  return new Date(a.dueAt||'2999-01-01')-new Date(b.dueAt||'2999-01-01');
}
function filteredHandovers(onlyMine=false){
  const me=activeUser();
  return state.handovers.filter(h=>{
    if(onlyMine && h.toUser!==me.id) return false;
    if(filters.q && !JSON.stringify(h).toLowerCase().includes(filters.q.toLowerCase())) return false;
    if(filters.status && h.status!==filters.status) return false;
    if(filters.priority && h.priority!==filters.priority) return false;
    if(filters.market && h.market!==filters.market) return false;
    if(filters.team && h.team!==filters.team) return false;
    if(filters.assignee && h.toUser!==filters.assignee && h.fromUser!==filters.assignee) return false;
    return true;
  }).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
}

" value="${esc(draft.shift)}" placeholder="AM → PM"></div><div class="field"><label>Due at</label><input type="datetime-local" data-f="dueAtLocal" value="${toLocalDT(draft.dueAt)}"></div><div class="field"><label>Links / tracker</label><input data-f="links" value="${esc(draft.links)}" placeholder="Sheet, folder, dashboard link"></div></div><div class="field" style="margin-top:13px"><label>Situation summary</label><textarea data-f="summary" placeholder="What happened? What should the receiver know?">${esc(draft.summary)}</textarea></div><div class="field" style="margin-top:13px"><label>Next action required</label><textarea data-f="nextAction" placeholder="Clear owner action, deadline, and expected output.">${esc(draft.nextAction)}</textarea></div><div class="section-head" style="margin-top:18px"><div><div class="section-title">Tasks</div><div class="section-sub">Break handover into executable actions.</div></div><button class="btn sm" onclick="addDraftTask()">＋ Add task</button></div><div id="taskBox">${draftTasksHTML()}</div><div class="section-head" style="margin-top:18px"><div><div class="section-title">Blockers</div><div class="section-sub">High blockers can auto-create escalations.</div></div><button class="btn sm" onclick="addDraftBlocker()">＋ Add blocker</button></div><div id="blockerBox">${draftBlockersHTML()}</div><div class="field" style="margin-top:13px"><label>Internal notes</label><textarea data-f="notes" placeholder="Optional context, approval gaps, client preferences.">${esc(draft.notes)}</textarea></div><div class="split" style="justify-content:flex-end;margin-top:18px"><button class="btn" onclick="closeDrawer()">Cancel</button>${editingId?`<button class="btn danger" onclick="deleteHandover('${draft.id}')">Delete</button>`:''}<button class="btn primary" onclick="saveHandover()">Save handover</button></div></div>`;

function saveHandover(){
  syncDraftFromForm();

  if(!draft.summary.trim()) return toast('Add a situation summary');
  const old = state.handovers.find(h=>h.id===draft.id);

      }
    }
  });

function openHandoverDetail(id){
  const h=state.handovers.find(x=>x.id===id); if(!h) return;
  openDrawer(`<div class="drawer-head"><div><div class="drawer-title">${esc(h.title)}</div><div class="small-muted">${esc(h.client||'No client')} · ${esc(h.team)} · ${esc(h.market)}</div></div><button class="icon-btn" onclick="closeDrawer()">×</button></div><div class="drawer-body"><div class="grid g3"><div class="kpi"><div class="kpi-label">Priority</div><div class="kpi-value" style="font-size:22px">${esc(h.priority)}</div><div class="kpi-sub">${priorityPill(h.priority)}</div></div><div class="kpi"><div class="kpi-label">Status</div><div class="kpi-value" style="font-size:22px">${esc(h.status)}</div><div class="kpi-sub">${statusPill(h.status)}</div></div><div class="kpi"><div class="kpi-label">Progress</div><div class="kpi-value">${taskProgress(h)}%</div><div class="kpi-sub">Tasks completed</div></div></div><div class="card flat" style="margin-top:16px"><div class="section-title">Ownership flow</div><div class="grid g2" style="margin-top:14px"><div class="profile-card">${avatarHTML(h.fromUser)}<div><div class="small-muted">From</div><div class="strong">${esc(userName(h.fromUser))}</div></div></div><div class="profile-card">${avatarHTML(h.toUser)}<div><div class="small-muted">To</div><div class="strong">${esc(userName(h.toUser))}</div></div></div></div></div><div class="card flat" style="margin-top:16px"><div class="section-title">Situation</div><p style="margin-top:12px;color:var(--muted);line-height:1.65;font-weight:650">${esc(h.summary)}</p><hr style="border:0;border-top:1px solid var(--line);margin:16px 0"><div class="section-title">Next action</div><p style="margin-top:12px;color:var(--muted);line-height:1.65;font-weight:650">${esc(h.nextAction||'—')}</p></div><div class="grid g2" style="margin-top:16px"><div class="card flat"><div class="section-title">Tasks</div><div style="margin-top:12px">${(h.tasks||[]).length?h.tasks.map(t=>`<div class="quick-card"><div><div class="quick-title">${esc(t.title)}</div><div class="quick-sub">${esc(userName(t.owner))} · due ${esc(t.due||'—')}</div></div>${statusPill(t.status)}</div>`).join(''):'<div class="empty">No tasks</div>'}</div></div><div class="card flat"><div class="section-title">Blockers</div><div style="margin-top:12px">${(h.blockers||[]).length?h.blockers.map(b=>`<div class="quick-card"><div><div class="quick-title">${esc(b.title)}</div><div class="quick-sub">${esc(b.nextAction||'No next action')}</div></div>${severityPill(b.severity)}</div>`).join(''):'<div class="empty">No blockers</div>'}</div></div></div><div class="split" style="justify-content:flex-end;margin-top:18px"><button class="btn" onclick="openHandoverForm('${h.id}')">Edit</button>${h.status==='submitted'?`<button class="btn success" onclick="ackHandover('${h.id}')">Acknowledge</button>`:''}${h.status!=='closed'?`<button class="btn primary" onclick="closeHandover('${h.id}')">Close</button>`:''}</div></div>`);
}
function ackHandover(id){ const h=state.handovers.find(x=>x.id===id); if(!h) return; h.status='acknowledged'; h.ackAt=new Date().toISOString(); h.ackBy=state.activeUserId; h.updatedAt=new Date().toISOString(); notify(h.fromUser,'Handover acknowledged',h.title,'handover',h.id); addActivity('◎','Handover acknowledged',`${h.title} acknowledged by ${userName(state.activeUserId)}.`,state.activeUserId); saveState(); closeDrawer(); render(); toast('Acknowledged'); }
function closeHandover(id){ const h=state.handovers.find(x=>x.id===id); if(!h) return; h.status='closed'; h.closedAt=new Date().toISOString(); h.updatedAt=new Date().toISOString(); addActivity('✓','Handover closed',`${h.title} closed by ${userName(state.activeUserId)}.`,state.activeUserId); saveState(); closeDrawer(); render(); toast('Handover closed'); }
function openUserModal(id=''){
  const u=id ? clone(userById(id)) : {id:uid('u'),name:'',role:'',team:state.teams[0],market:state.markets[0].code,shift:'AM',status:'online',email:'',phone:'',bio:''};
  openModal(`<div class="modal-head"><div class="modal-title">${id?'Edit profile':'Add user profile'}</div><button class="icon-btn" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-grid fg2"><div class="field"><label>Name</label><input id="u_name" value="${esc(u.name)}"></div><div class="field"><label>Role</label><input id="u_role" value="${esc(u.role)}"></div><div class="field"><label>Team</label><select id="u_team">${state.teams.map(t=>`<option value="${esc(t)}" ${u.team===t?'selected':''}>${esc(t)}</option>`).join('')}</select></div><div class="field"><label>Market</label><select id="u_market">${state.markets.map(m=>`<option value="${m.code}" ${u.market===m.code?'selected':''}>${esc(m.name)}</option>`).join('')}</select></div><div class="field"><label>Shift</label><input id="u_shift" value="${esc(u.shift)}"></div><div class="field"><label>Status</label><select id="u_status">${USER_STATUS.map(s=>`<option value="${s}" ${u.status===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>Email</label><input id="u_email" value="${esc(u.email)}"></div><div class="field"><label>Phone</label><input id="u_phone" value="${esc(u.phone)}"></div></div><div class="field" style="margin-top:13px"><label>Bio / scope</label><textarea id="u_bio">${esc(u.bio)}</textarea></div><div class="split" style="justify-content:flex-end;margin-top:16px">${id&&state.users.length>1?`<button class="btn danger" onclick="deleteUser('${u.id}')">Delete</button>`:''}<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveUser('${u.id}','${id?'edit':'new'}')">Save profile</button></div></div>`);
}
function saveUser(id,mode){
  const u={id,name:$('#u_name').value.trim(),role:$('#u_role').value.trim(),team:$('#u_team').value,market:$('#u_market').value,shift:$('#u_shift').value.trim(),status:$('#u_status').value,email:$('#u_email').value.trim(),phone:$('#u_phone').value.trim(),bio:$('#u_bio').value.trim()};
  if(!u.name) return toast('Add a user name');
  const idx=state.users.findIndex(x=>x.id===id); if(idx>=0) state.users[idx]=u; else state.users.push(u);
  if(mode==='new') addActivity('◉','New profile connected',`${u.name} joined ${u.team} · ${u.market}.`,state.activeUserId);
  saveState(); closeModal(); render(); toast('Profile saved');
}
function deleteUser(id){ if(id===state.activeUserId) return toast('Switch active profile before deleting it'); if(!confirm('Delete this user profile? Existing records become unassigned labels.')) return; state.users=state.users.filter(u=>u.id!==id); saveState(); closeModal(); render(); toast('Profile deleted'); }
function openEscModal(id=''){
  const e=id?clone(state.escalations.find(x=>x.id===id)):{id:uid('esc'),title:'',severity:'Medium',market:activeUser().market,team:activeUser().team,owner:state.activeUserId,status:'open',raisedAt:new Date().toISOString(),raisedBy:state.activeUserId,nextAction:'',sourceHandoverId:''};
  openModal(`<div class="modal-head"><div class="modal-title">${id?'Edit escalation':'Log escalation'}</div><button class="icon-btn" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-grid fg2"><div class="field" style="grid-column:span 2"><label>Title</label><input id="e_title" value="${esc(e.title)}"></div><div class="field"><label>Severity</label><select id="e_sev">${['High','Medium','Low'].map(s=>`<option value="${s}" ${e.severity===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>Status</label><select id="e_status">${['open','in-progress','resolved'].map(s=>`<option value="${s}" ${e.status===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>Market</label><select id="e_market">${state.markets.map(m=>`<option value="${m.code}" ${e.market===m.code?'selected':''}>${esc(m.name)}</option>`).join('')}</select></div><div class="field"><label>Team</label><select id="e_team">${state.teams.map(t=>`<option value="${esc(t)}" ${e.team===t?'selected':''}>${esc(t)}</option>`).join('')}</select></div><div class="field"><label>Owner</label><select id="e_owner">${state.users.map(u=>`<option value="${u.id}" ${e.owner===u.id?'selected':''}>${esc(u.name)}</option>`).join('')}</select></div><div class="field"><label>Raised at</label><input type="datetime-local" id="e_raised" value="${toLocalDT(e.raisedAt)}"></div></div><div class="field" style="margin-top:13px"><label>Next action</label><textarea id="e_next">${esc(e.nextAction)}</textarea></div><div class="split" style="justify-content:flex-end;margin-top:16px"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveEsc('${e.id}','${id?'edit':'new'}')">Save escalation</button></div></div>`);
}
function saveEsc(id,mode){
  const e={id,title:$('#e_title').value.trim(),severity:$('#e_sev').value,status:$('#e_status').value,market:$('#e_market').value,team:$('#e_team').value,owner:$('#e_owner').value,raisedAt:fromLocalDT($('#e_raised').value)||new Date().toISOString(),raisedBy:mode==='new'?state.activeUserId:(state.escalations.find(x=>x.id===id)?.raisedBy||state.activeUserId),nextAction:$('#e_next').value.trim()};
  if(!e.title) return toast('Add escalation title');
  if(e.status==='resolved' && !e.resolvedAt) e.resolvedAt=new Date().toISOString();
  const idx=state.escalations.findIndex(x=>x.id===id); if(idx>=0) state.escalations[idx]=Object.assign(state.escalations[idx],e); else state.escalations.unshift(e);
  notify(e.owner,`Escalation ${e.status}`,e.title,'escalation',e.id);
  addActivity('⚠',mode==='new'?'Escalation logged':'Escalation updated',`${e.title} · ${e.severity}.`,state.activeUserId);
  saveState(); closeModal(); render(); toast('Escalation saved');
}
function resolveEsc(id){ const e=state.escalations.find(x=>x.id===id); if(!e) return; e.status='resolved'; e.resolvedAt=new Date().toISOString(); addActivity('✓','Escalation resolved',e.title,state.activeUserId); saveState(); render(); toast('Escalation resolved'); }
function markMyNotificationsRead(){ state.notifications.forEach(n=>{ if(n.userId===state.activeUserId) n.read=true; }); saveState(); render(); toast('Notifications marked read'); }
function openDrawer(html){ $('#drawer').innerHTML=html; $('#drawerBackdrop').classList.add('show'); $('#drawer').classList.add('show'); }
function closeDrawer(){ $('#drawer').classList.remove('show'); $('#drawerBackdrop').classList.remove('show'); setTimeout(()=>{ $('#drawer').innerHTML=''; draft=null; editingId=null; },230); }
function openModal(html){ $('#modalBackdrop').innerHTML=`<div class="modal">${html}</div>`; $('#modalBackdrop').classList.add('show'); }
function closeModal(){ $('#modalBackdrop').classList.remove('show'); setTimeout(()=>$('#modalBackdrop').innerHTML='',180); }
function exportJSON(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); downloadBlob(blob,`trygc-os-backup-${TODAY()}.json`); toast('Backup downloaded'); }
function exportCSV(){
  const rows=[['id','title','client','market','team','priority','status','from_user','to_user','due_at','tasks_total','tasks_done','blockers','high_blockers','updated_at','summary','next_action']];
  state.handovers.forEach(h=>rows.push([h.id,h.title,h.client,h.market,h.team,h.priority,h.status,userName(h.fromUser),userName(h.toUser),h.dueAt,(h.tasks||[]).length,(h.tasks||[]).filter(t=>t.status==='done').length,(h.blockers||[]).length,(h.blockers||[]).filter(b=>b.severity==='High').length,h.updatedAt,h.summary,h.nextAction]));
  const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  downloadBlob(new Blob([csv],{type:'text/csv'}),`trygc-handovers-${TODAY()}.csv`); toast('CSV downloaded');
}
function downloadBlob(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href); }
function importJSON(e){ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{ try{ const parsed=normalizeState(JSON.parse(reader.result)); if(confirm('Replace current local data with this backup?')){ state=parsed; saveState(); render(); toast('Backup imported'); } }catch(err){ alert('Invalid TryGC OS backup file.'); } e.target.value=''; }; reader.readAsText(file); }
window.setRoute=setRoute; window.toggleTheme=()=>{ const root=document.documentElement; root.dataset.theme=root.dataset.theme==='dark'?'light':'dark'; localStorage.setItem('trygc_theme',root.dataset.theme); };
window.switchUser=switchUser; window.openHandoverForm=openHandoverForm; window.openHandoverDetail=openHandoverDetail; window.closeDrawer=closeDrawer; window.addDraftTask=addDraftTask; window.removeDraftTask=removeDraftTask; window.addDraftBlocker=addDraftBlocker; window.removeDraftBlocker=removeDraftBlocker; window.saveHandover=saveHandover; window.deleteHandover=deleteHandover; window.ackHandover=ackHandover; window.closeHandover=closeHandover; window.openUserModal=openUserModal; window.saveUser=saveUser; window.deleteUser=deleteUser; window.openEscModal=openEscModal; window.saveEsc=saveEsc; window.resolveEsc=resolveEsc; window.closeModal=closeModal; window.markMyNotificationsRead=markMyNotificationsRead; window.clearFilters=clearFilters; window.exportJSON=exportJSON; window.exportCSV=exportCSV; window.importJSON=importJSON; window.saveSettings=saveSettings; window.resetDemo=resetDemo; window.addTeam=addTeam; window.addMarket=addMarket;
(function boot(){ const theme=localStorage.getItem('trygc_theme'); if(theme) document.documentElement.dataset.theme=theme; render(); })();
</script>
</body>
